# Search vocabulary seed — edit freely without code changes.
# Loaded once at startup. Restart the server to pick up changes.
#
# person_terms:      triggers person/face routing in the query planner
# place_terms:       triggers place routing and place_terms extraction
# visual_terms:      triggers visual/CLIP routing
# ocr_terms:         triggers OCR-first routing
# place_aliases:     variant → canonical place name (e.g. 제주도 → 제주)
#
# Hint sets — used by resolve_effective_mode to select the right search channel:
# face_hints:        queries about people/faces → semantic mode
# text_hints:        queries about text/documents → OCR mode
# screen_hints:      queries about screenshots/UI → OCR mode
# travel_hints:      queries about travel/outdoor scenes → semantic mode
# celebration_hints: queries about parties/ceremonies → semantic mode

