# Filename keyword auto-tags. Bump semantic_auto_tag_version when changing these.
#
# Each rule is matched against Path(filename).stem with case-insensitive regex.
rules:
  - pattern: "kakao|카카오|kkt"
    tag_value: "kakaotalk"
    tag_type: "auto_screen"
  - pattern: "screenshot|screen|스크린|캡처"
    tag_value: "screenshot"
    tag_type: "auto_screen"
  - pattern: "receipt|영수증"
    tag_value: "receipt"
    tag_type: "auto_screen"
  - pattern: "beach|sea|ocean|coast|바다|바닷가|해변|해수욕장|해안"
    tag_value: "beach"
    tag_type: "auto_scene"
  - pattern: "travel|여행|trip|tour"
    tag_value: "travel"
    tag_type: "auto_scene"
  - pattern: "food|meal|음식|식사|맛집"
    tag_value: "food"
    tag_type: "auto_object"
  - pattern: "wedding|결혼|웨딩"
    tag_value: "wedding"
    tag_type: "auto_event"
  - pattern: "birthday|생일"
    tag_value: "birthday"
    tag_type: "auto_event"
  - pattern: "party|파티"
    tag_value: "celebration"
    tag_type: "auto_event"
  - pattern: "dog|강아지|puppy"
    tag_value: "animal"
    tag_type: "auto_object"
  - pattern: "cat|고양이"
    tag_value: "animal"
    tag_type: "auto_object"
  - pattern: "baby|아기|애기|infant|newborn|toddler"
    tag_value: "baby"
    tag_type: "auto_person"
  - pattern: "woman|women|female|girl|여자|여성"
    tag_value: "woman"
    tag_type: "auto_person"
  - pattern: "man|men|male|boy|남자|남성"
    tag_value: "man"
    tag_type: "auto_person"
  - pattern: "selfie|셀카|셀피"
    tag_value: "person"
    tag_type: "auto_person"
  - pattern: "family|가족"
    tag_value: "group"
    tag_type: "auto_person"
  - pattern: "jeju|제주"
    tag_value: "travel"
    tag_type: "auto_scene"
  - pattern: "seoul|서울"
    tag_value: "travel"
    tag_type: "auto_scene"
  - pattern: "mountain|산|등산|hiking"
    tag_value: "mountain"
    tag_type: "auto_scene"
  - pattern: "cafe|카페|coffee|커피"
    tag_value: "coffee"
    tag_type: "auto_object"
  - pattern: "night|야경|야간"
    tag_value: "night"
    tag_type: "auto_scene"
