# CLIP zero-shot auto-tagging. Bump semantic_auto_tag_version when changing
# thresholds, prompts, aliases, or max_aliases_per_concept.
settings:
  # Cap stored auto-tag aliases per hit (limits shadow/UI noise; raise if needed).
  max_aliases_per_concept: 8

concepts:
