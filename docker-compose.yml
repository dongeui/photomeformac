services:
  trove:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${TROVE_DOCKER_TARGET:-runtime-ai}
    image: ${TROVE_IMAGE:-trove-local-ai:local}
    container_name: ${TROVE_CONTAINER_NAME:-trove}
    restart: unless-stopped
    ports:
      - "${TROVE_PORT:-8002}:8000"
    environment:
      TROVE_SERVER_HOST: "0.0.0.0"
      TROVE_SERVER_PORT: "8000"
      TROVE_DATA_ROOT: "/var/lib/trove/data"
      TROVE_DERIVED_ROOT: "/var/lib/trove/derived"
      TROVE_MODEL_ROOT: "/var/lib/trove/models"
      TROVE_GEODATA_ROOT: "/var/lib/trove/models/geodata"
      TROVE_DATABASE_PATH: "/var/lib/trove/data/photome.sqlite3"
      TROVE_SOURCE_ROOTS: "${TROVE_SOURCE_MOUNT:-/photos}"
      TROVE_SOURCE_ROOT_HOST: "${TROVE_SOURCE_ROOT:-./photos}"
      TROVE_SOURCE_ROOT_MOUNT: "${TROVE_SOURCE_MOUNT:-/photos}"
      TROVE_CLIP_ENABLED: "${TROVE_CLIP_ENABLED:-1}"
      TROVE_OFFLINE_MODE: "${TROVE_OFFLINE_MODE:-1}"
      TROVE_GEOCODING_ENABLED: "${TROVE_GEOCODING_ENABLED:-1}"
      TROVE_SYNC_SCHEDULER_ENABLED: "${TROVE_SYNC_SCHEDULER_ENABLED:-1}"
      TROVE_SEMANTIC_AUTO_TAG_VERSION: "${TROVE_SEMANTIC_AUTO_TAG_VERSION:-auto-v1}"
      TROVE_LOG_LEVEL: "${TROVE_LOG_LEVEL:-INFO}"
      TROVE_RUN_UID: "${TROVE_RUN_UID:-1000}"
      TROVE_RUN_GID: "${TROVE_RUN_GID:-1000}"
      TROVE_HOME: "/var/lib/trove"
      HOME: "/var/lib/trove"
      HF_HOME: "/var/lib/trove/models/hf"
      TORCH_HOME: "/var/lib/trove/models/torch"
      TRANSFORMERS_CACHE: "/var/lib/trove/models/hf"
    volumes:
      - ${TROVE_MAC_VOLUMES_ROOT:-/Volumes}:/Volumes:ro
      - ${TROVE_MAC_USERS_ROOT:-/Users}:/Users:ro
      - ${TROVE_SOURCE_ROOT:-./photos}:${TROVE_SOURCE_MOUNT:-/photos}:ro
      - ${TROVE_DATA_ROOT_HOST:-./data}:/var/lib/trove/data
      - ${TROVE_DERIVED_ROOT_HOST:-./derived_root}:/var/lib/trove/derived
      - ${TROVE_MODEL_ROOT_HOST:-./model_cache}:/var/lib/trove/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/status', timeout=4).read(1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
