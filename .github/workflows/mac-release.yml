name: Mac Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.1.0"
        required: true
        default: "0.1.0"
      build:
        description: "Build number"
        required: true
        default: "1"
      bundle_python:
        description: "Bundle Python runtime (.venv) into the app"
        required: true
        type: boolean
        default: false
      publish_release:
        description: "Create/update GitHub Release"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "mac-v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build Mac DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set release variables
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#mac-v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "PHOTOME_MAC_VERSION=${version}" >> "$GITHUB_ENV"
          echo "PHOTOME_MAC_BUILD=${{ inputs.build || github.run_number }}" >> "$GITHUB_ENV"

      - name: Set up Python (for runtime bundling)
        if: inputs.bundle_python == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build runtime venv
        if: inputs.bundle_python == true
        run: |
          python3.11 -m venv .venv311
          .venv311/bin/pip install --upgrade pip wheel setuptools
          .venv311/bin/pip install -e ".[clip]"

      - name: Build ad-hoc signed app and DMG
        env:
          PHOTOME_BUNDLE_PYTHON: ${{ inputs.bundle_python && '1' || '0' }}
        run: scripts/build_mac_app_bundle.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhotomeForMac-dmg
          path: dist/mac/PhotomeForMac.dmg
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: github.ref_type == 'tag' || inputs.publish_release == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            tag="mac-v${PHOTOME_MAC_VERSION}"
            git tag "$tag" || true
            git push origin "$tag" || true
          fi
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "Photome for Mac ${PHOTOME_MAC_VERSION}" --notes "Automated macOS DMG build."
          gh release upload "$tag" dist/mac/PhotomeForMac.dmg --clobber
