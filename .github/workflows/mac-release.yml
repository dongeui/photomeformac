name: Mac Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.1.0"
        required: true
        default: "0.1.0"
      build:
        description: "Build number"
        required: true
        default: "1"
      bundle_python:
        description: "Bundle Python runtime (.venv) into the app"
        required: true
        type: boolean
        default: false
      publish_release:
        description: "Create/update GitHub Release"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "mac-v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build Mac DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set release variables
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#mac-v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "TROVE_MAC_VERSION=${version}" >> "$GITHUB_ENV"
          echo "TROVE_MAC_BUILD=${{ inputs.build || github.run_number }}" >> "$GITHUB_ENV"

      - name: Set up Python (for runtime bundling)
        if: inputs.bundle_python == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build runtime venv
        if: inputs.bundle_python == true
        run: |
          python3.11 -m venv .venv311
          .venv311/bin/pip install --upgrade pip wheel setuptools
          .venv311/bin/pip install -e ".[clip]"

      - name: Import Developer ID certificate
        if: env.MAC_DEVELOPER_ID_CERT_BASE64 != '' && env.MAC_DEVELOPER_ID_CERT_PASSWORD != ''
        env:
          MAC_DEVELOPER_ID_CERT_BASE64: ${{ secrets.MAC_DEVELOPER_ID_CERT_BASE64 }}
          MAC_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "$MAC_DEVELOPER_ID_CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$MAC_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f /tmp/cert.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build app and DMG
        env:
          TROVE_BUNDLE_PYTHON: ${{ inputs.bundle_python && '1' || '0' }}
          TROVE_MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY || '-' }}
        run: scripts/build_mac_app_bundle.sh

      - name: Notarize DMG
        if: env.MAC_NOTARY_APPLE_ID != '' && env.MAC_NOTARY_TEAM_ID != '' && env.MAC_NOTARY_PASSWORD != ''
        env:
          MAC_NOTARY_APPLE_ID: ${{ secrets.MAC_NOTARY_APPLE_ID }}
          MAC_NOTARY_TEAM_ID: ${{ secrets.MAC_NOTARY_TEAM_ID }}
          MAC_NOTARY_PASSWORD: ${{ secrets.MAC_NOTARY_PASSWORD }}
          TROVE_NOTARY_APPLE_ID: ${{ secrets.MAC_NOTARY_APPLE_ID }}
          TROVE_NOTARY_TEAM_ID: ${{ secrets.MAC_NOTARY_TEAM_ID }}
          TROVE_NOTARY_PASSWORD: ${{ secrets.MAC_NOTARY_PASSWORD }}
        run: scripts/notarize_mac_app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trove-dmg
          path: dist/mac/Trove.dmg
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: github.ref_type == 'tag' || inputs.publish_release == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            tag="mac-v${TROVE_MAC_VERSION}"
            git tag "$tag" || true
            git push origin "$tag" || true
          fi
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "Trove for Mac ${TROVE_MAC_VERSION}" --notes "Automated macOS DMG build."
          gh release upload "$tag" dist/mac/Trove.dmg --clobber
