name: Agent PR Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR stage
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set((pr.labels || []).map((label) => label.name));
            const stageLabels = [
              "agent:dev",
              "agent:qa",
              "agent:planner-review",
              "agent:changes-requested",
              "agent:ready-to-merge",
            ];

            const activeStages = stageLabels.filter((label) => labels.has(label));
            core.notice(`Active stage labels: ${activeStages.join(", ") || "(none)"}`);

            if (activeStages.length > 1) {
              core.setFailed(`Only one agent stage label is allowed. Found: ${activeStages.join(", ")}`);
              return;
            }

            if (pr.draft) {
              core.notice("Draft PR detected. Gate passes until it is ready for review.");
              return;
            }

            if (labels.has("agent:changes-requested")) {
              core.setFailed("PR is blocked by agent:changes-requested.");
              return;
            }

            if (!labels.has("agent:ready-to-merge")) {
              const current = activeStages[0] || "(no active stage)";
              core.setFailed(`PR is not merge-ready. Current stage: ${current}. Expected: agent:ready-to-merge.`);
            }

